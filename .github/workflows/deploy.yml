name: "Export and Deploy to GitHub Pages"

on:
  push:
    branches:
      - main # Set this to your primary branch name
# This grants the workflow permission to write to the gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    name: Web Export
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          # Download templates directly from Godot's servers
          curl -L https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz -o templates.tpz
          unzip templates.tpz
          # The .tpz contains a 'templates' folder; we move its contents to the expected location
          mv templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf templates.tpz templates

      - name: Export for Web
        run: |
          mkdir -v -p build/web
          # Assumes you have an export preset named "Web" in Godot
          godot --headless --export-release "Web" build/web/index.html

      - name: Add COOP/COEP Header Fix (for Godot 4)
        run: |
          # Download the service worker script
          curl -L https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o build/web/coi-serviceworker.min.js
          # Inject the script tag into index.html
          sed -i 's/<script/<script src="coi-serviceworker.min.js"><\/script><script/' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages # The branch the action will deploy to.
